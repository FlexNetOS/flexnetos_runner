name: Semantic PR Title
# OWNER_BREAK_GLASS_ONLY: disabled until every run step is Nushell.

on:
  pull_request_target:
    types: [opened, edited, synchronize, reopened, ready_for_review]
  workflow_dispatch:
    inputs:
      pr_title:
        description: PR title to validate for action-created PR required-check dispatch
        required: true
        type: string

permissions:
  pull-requests: read

concurrency:
  group: semantic-pr-title-${{ github.event.pull_request.number || inputs.pr_title || github.run_id }}
  cancel-in-progress: true

jobs:
  validate:
    if: ${{ vars.FLEXNETOS_OWNER_BREAK_GLASS_NON_NUSHELL == 'I_ACCEPT_NON_NUSHELL' }}
    name: Semantic PR Title
    runs-on: [self-hosted, linux, x64, local, flexnetos]
    env:
      PR_TITLE: ${{ github.event.pull_request.title || inputs.pr_title }}
    steps:
      - name: Validate PR title locally
        shell: bash
        run: |
          set -euo pipefail
          title="$PR_TITLE"
          conventional='^(build|chore|ci|deps|docs|feat|fix|perf|refactor|revert|style|test)(\([A-Za-z0-9._/-]+\))?!?: .+'
          codex='^\[codex\] .+'
          if [[ "$title" =~ $conventional || "$title" =~ $codex ]]; then
            echo "accepted PR title: $title"
            exit 0
          fi

          cat >&2 <<MSG
          Invalid PR title: $title

          Use Conventional Commits style, for example:
            feat: add local runner CI
            fix(dispatch): repair runner labels

          Codex agent chunks may also use:
            [codex] short description
          MSG
          exit 1
