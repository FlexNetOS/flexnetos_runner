name: Runner Sustain

on:
  workflow_dispatch:
    inputs:
      duration_minutes:
        description: Minutes to keep the reserve-safe local runner lane doing useful audit work
        required: false
        default: '5'
      tick_seconds:
        description: Seconds between useful audit ticks
        required: false
        default: '30'
      lane_slot:
        description: Logical local runner lane label for proof logs
        required: false
        default: '1'
  schedule:
    - cron: '*/5 * * * *'

permissions:
  actions: read
  contents: read
  pull-requests: read

concurrency:
  group: runner-sustain-${{ github.ref }}-${{ inputs.lane_slot || '1' }}
  cancel-in-progress: false

jobs:
  local-runner-sustain:
    name: Runner sustain slot ${{ inputs.lane_slot || '1' }}
    runs-on: [self-hosted, linux, x64, local, flexnetos]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
      - name: Prefer meta-owned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "/home/drdave/Desktop/meta/.toolchains/cargo/bin" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_WRAPPER=" >> "$GITHUB_ENV"
      - name: Yield to pull-request local checks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          pr_pressure_count() {
            local count
            if ! count="$(gh pr list --state open --json statusCheckRollup --jq '
              [
                .[].statusCheckRollup[]?
                | select((.name == "Local Linux CI" or .name == "Semantic PR Title")
                  and ((.status == "QUEUED") or (.status == "IN_PROGRESS") or (.status == "PENDING")
                    or (.conclusion == "FAILURE") or (.conclusion == "TIMED_OUT") or (.conclusion == "CANCELLED")))
              ] | length
            ')"; then
              echo "::notice::runner-sustain yielding because PR pressure query failed" >&2
              echo 1
              return 0
            fi
            echo "$count"
          }
          pr_pressure="$(pr_pressure_count)"
          case "$pr_pressure" in (*[!0-9]*|'') pr_pressure=1 ;; esac
          if [ "$pr_pressure" -gt 0 ]; then
            echo "::notice::runner-sustain yielding to ${pr_pressure} pending or failed PR-local checks"
            exit 0
          fi
      - name: Useful forge-loop sustain checks
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          DURATION_MINUTES: ${{ inputs.duration_minutes || '5' }}
          TICK_SECONDS: ${{ inputs.tick_seconds || '30' }}
          SLOT: ${{ inputs.lane_slot || '1' }}
        run: |
          set -euo pipefail
          duration_minutes="${DURATION_MINUTES:-5}"
          tick_seconds="${TICK_SECONDS:-30}"
          case "$duration_minutes" in (*[!0-9]*|'') duration_minutes=5 ;; esac
          case "$tick_seconds" in (*[!0-9]*|'') tick_seconds=30 ;; esac
          if [ "$duration_minutes" -lt 1 ]; then duration_minutes=1; fi
          if [ "$duration_minutes" -gt 8 ]; then duration_minutes=8; fi
          if [ "$tick_seconds" -lt 15 ]; then tick_seconds=15; fi
          if [ "$tick_seconds" -gt 300 ]; then tick_seconds=300; fi
          pr_pressure_count() {
            local count
            if ! count="$(gh pr list --state open --json statusCheckRollup --jq '
              [
                .[].statusCheckRollup[]?
                | select((.name == "Local Linux CI" or .name == "Semantic PR Title")
                  and ((.status == "QUEUED") or (.status == "IN_PROGRESS") or (.status == "PENDING")
                    or (.conclusion == "FAILURE") or (.conclusion == "TIMED_OUT") or (.conclusion == "CANCELLED")))
              ] | length
            ')"; then
              echo "::notice::runner-sustain yielding because PR pressure query failed" >&2
              echo 1
              return 0
            fi
            echo "$count"
          }
          end=$(( $(date +%s) + duration_minutes * 60 ))
          tick=0
          while [ "$(date +%s)" -lt "$end" ]; do
            pr_pressure="$(pr_pressure_count)"
            case "$pr_pressure" in (*[!0-9]*|'') pr_pressure=0 ;; esac
            if [ "$pr_pressure" -gt 0 ]; then
              echo "::notice::runner-sustain yielding mid-run to ${pr_pressure} pending or failed PR-local checks"
              exit 0
            fi
            tick=$((tick + 1))
            echo "runner-sustain slot=${SLOT} tick=${tick} duration_minutes=${duration_minutes} tick_seconds=${tick_seconds}"
            cargo run -q -p runner-cli -- forge-loop components-audit --strict
            cargo run -q -p runner-cli -- forge-loop target-mining-audit --strict
            cargo run -q -p runner-cli -- forge-loop docs-drift --json
            remaining=$(( end - $(date +%s) ))
            if [ "$remaining" -le 0 ]; then break; fi
            if [ "$remaining" -lt "$tick_seconds" ]; then sleep "$remaining"; else sleep "$tick_seconds"; fi
          done
