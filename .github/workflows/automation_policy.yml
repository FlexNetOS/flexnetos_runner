name: Kache-only and Nushell-only automation policy

on:
  pull_request:
  push:
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: nu {0}

jobs:
  automation-policy:
    name: Enforce automation policy
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
      - name: Install Nushell
        uses: nushell/setup-nu@v1
        with:
          version: 0.113.1
      - name: Reject non-Kache caches and automatic non-Nushell jobs
        run: nu nushell/runner_policy.nu --root .
