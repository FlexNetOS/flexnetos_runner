name: Runner Black Factor Watch

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  actions: write
  contents: read
  pull-requests: read

concurrency:
  group: runner-black-factor-watch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watch:
    name: Audit and refill runner sustain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Capture run and PR history
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --limit 200 --json name,status,conclusion,createdAt,updatedAt,event,url > runs-live.json
          gh pr list --state open --limit 100 --json state,mergedAt,statusCheckRollup,url > prs-open.json
          gh pr list --state all --limit 100 --json state,mergedAt,statusCheckRollup,url > prs-history.json
      - name: Refill Runner Sustain if no sustain work is active
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          active_sustain="$(jq '[.[] | select(.name == "Runner Sustain" and ((.status == "queued") or (.status == "pending") or (.status == "in_progress")))] | length' runs-live.json)"
          case "$active_sustain" in (*[!0-9]*|'') active_sustain=0 ;; esac
          if [ "$active_sustain" -eq 0 ]; then
            echo "::notice::dispatching Runner Sustain because no active/queued sustain work exists"
            gh workflow run runner-sustain.yml --ref main -f duration_minutes=6 -f tick_seconds=45
            sleep 20
            gh run list --limit 200 --json name,status,conclusion,createdAt,updatedAt,event,url > runs-live.json
          fi
      - name: Prove instantaneous runner flow
        shell: bash
        run: |
          set -euo pipefail
          cargo run -q -p runner-cli -- forge-loop runner-flow-audit \
            --runs-json runs-live.json \
            --prs-json prs-open.json \
            --strict \
            --json | tee runner-flow-audit.json
      - name: Record black-factor progress
        shell: bash
        run: |
          set -euo pipefail
          cargo run -q -p runner-cli -- forge-loop runner-black-factor-audit \
            --runs-json runs-live.json \
            --prs-json prs-history.json \
            --json | tee runner-black-factor-audit.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runner-black-factor-watch-${{ github.run_id }}
          path: |
            runs-live.json
            prs-open.json
            prs-history.json
            runner-flow-audit.json
            runner-black-factor-audit.json
