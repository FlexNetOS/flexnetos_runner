name: Runner Black Factor Watch

on:
  workflow_dispatch:
  schedule:
    - cron: '*/5 * * * *'

permissions:
  actions: write
  contents: read
  pull-requests: read

concurrency:
  group: runner-black-factor-watch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watch:
    name: Audit and refill runner sustain
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Capture run and PR history
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --limit 1000 --json name,status,conclusion,createdAt,updatedAt,event,url > runs-live.json
          gh pr list --state open --limit 100 --json state,mergedAt,statusCheckRollup,url > prs-open.json
          gh pr list --state all --limit 200 --json state,mergedAt,statusCheckRollup,url > prs-history.json
      - name: Top up Runner Sustain backlog
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MIN_SUSTAIN_BACKLOG: '4'
        run: |
          set -euo pipefail
          target_sustain_backlog="${MIN_SUSTAIN_BACKLOG:-4}"
          case "$target_sustain_backlog" in (*[!0-9]*|'') target_sustain_backlog=4 ;; esac
          if [ "$target_sustain_backlog" -lt 1 ]; then target_sustain_backlog=1; fi
          if [ "$target_sustain_backlog" -gt 4 ]; then target_sustain_backlog=4; fi
          pr_pending_pressure="$(jq '[
            .[].statusCheckRollup[]?
            | select((.name == "Local Linux CI" or .name == "Semantic PR Title")
              and ((.status == "QUEUED") or (.status == "IN_PROGRESS") or (.status == "PENDING")))
          ] | length' prs-open.json)"
          pr_failed_pressure="$(jq '[
            .[].statusCheckRollup[]?
            | select((.name == "Local Linux CI" or .name == "Semantic PR Title")
              and ((.conclusion == "FAILURE") or (.conclusion == "TIMED_OUT") or (.conclusion == "CANCELLED")))
          ] | length' prs-open.json)"
          case "$pr_pending_pressure" in (*[!0-9]*|'') pr_pending_pressure=1 ;; esac
          case "$pr_failed_pressure" in (*[!0-9]*|'') pr_failed_pressure=1 ;; esac
          pr_pressure=$((pr_pending_pressure + pr_failed_pressure))
          {
            echo "pr_pending_pressure=${pr_pending_pressure}"
            echo "pr_failed_pressure=${pr_failed_pressure}"
          } > runner-pressure.env
          if [ "$pr_pressure" -gt 0 ]; then
            echo "::notice::skipping Runner Sustain backlog top-up because ${pr_pressure} PR-local checks need the runner lane"
            exit 0
          fi
          active_sustain="$(jq '[.[] | select(.name == "Runner Sustain" and ((.status == "queued") or (.status == "pending") or (.status == "in_progress")))] | length' runs-live.json)"
          case "$active_sustain" in (*[!0-9]*|'') active_sustain=0 ;; esac
          while [ "$active_sustain" -lt "$target_sustain_backlog" ]; do
            lane_slot=$((active_sustain % 2 + 1))
            echo "::notice::dispatching Runner Sustain lane ${lane_slot} backlog top-up ${active_sustain}/${target_sustain_backlog}"
            gh workflow run runner-sustain.yml --ref main -f duration_minutes=5 -f tick_seconds=30 -f lane_slot="${lane_slot}"
            active_sustain=$((active_sustain + 1))
          done
          if [ "$active_sustain" -gt 0 ]; then
            sleep 20
            gh run list --limit 1000 --json name,status,conclusion,createdAt,updatedAt,event,url > runs-live.json
          fi
      - name: Prove instantaneous runner flow
        shell: bash
        run: |
          set -euo pipefail
          pr_pending_pressure=0
          pr_failed_pressure=0
          if [ -f runner-pressure.env ]; then
            # shellcheck disable=SC1091
            . ./runner-pressure.env
          fi
          if [ "${pr_failed_pressure}" -eq 0 ] && [ "${pr_pending_pressure}" -gt 0 ]; then
            echo "::notice::recording non-strict runner-flow audit while ${pr_pending_pressure} pending PR-local checks own the runner lane"
            cargo run -q -p runner-cli -- forge-loop runner-flow-audit \
              --runs-json runs-live.json \
              --prs-json prs-open.json \
              --json | tee runner-flow-audit.json
            exit 0
          fi
          cargo run -q -p runner-cli -- forge-loop runner-flow-audit \
            --runs-json runs-live.json \
            --prs-json prs-open.json \
            --strict \
            --json | tee runner-flow-audit.json
      - name: Record black-factor progress
        shell: bash
        run: |
          set -euo pipefail
          cargo run -q -p runner-cli -- forge-loop runner-black-factor-audit \
            --runs-json runs-live.json \
            --prs-json prs-history.json \
            --json | tee runner-black-factor-audit.json
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: runner-black-factor-watch-${{ github.run_id }}
          path: |
            runs-live.json
            prs-open.json
            prs-history.json
            runner-pressure.env
            runner-flow-audit.json
            runner-black-factor-audit.json
