name: Codex Forge Loop

on:
  workflow_dispatch:
    inputs:
      prompt_file:
        description: Prompt file to run with Codex
        required: false
        default: .github/codex/prompts/forge-loop.md
      model:
        description: Codex model
        required: false
        default: gpt-5.5
      effort:
        description: Codex reasoning effort
        required: false
        default: high

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: write


jobs:
  codex-forge-loop:
    name: Codex forge-loop action
    runs-on: [self-hosted, linux, x64, local, flexnetos]
    timeout-minutes: 60
    env:
      CODEX_HOME: /home/flexnetos/.codex
      CODEX_BIN: /home/flexnetos/.nix-profile/bin/codex
      GH_CONFIG_DIR: /home/flexnetos/.config/gh
      MODEL_INPUT: ${{ inputs.model }}
      EFFORT_INPUT: ${{ inputs.effort }}
      PROMPT_FILE_INPUT: ${{ inputs.prompt_file }}
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure local GitHub auth for publisher
        shell: bash
        env:
          GH_CONFIG_DIR: ${{ env.GH_CONFIG_DIR }}
        run: |
          set -euo pipefail
          unset GH_TOKEN GITHUB_TOKEN
          gh auth status --hostname github.com
          gh auth setup-git --hostname github.com
          if [ ! -s /home/flexnetos/.ssh/id_ed25519 ]; then
            echo "::error::local runner SSH deploy key missing; workflow-file PR publishing needs SSH instead of OAuth workflow scope"
            exit 1
          fi
          mkdir -p /home/flexnetos/.ssh
          ssh-keyscan -H github.com >> /home/flexnetos/.ssh/known_hosts 2>/dev/null || true
          echo "GIT_SSH_COMMAND=ssh -i /home/flexnetos/.ssh/id_ed25519 -o IdentitiesOnly=yes -o StrictHostKeyChecking=accept-new" >> "${GITHUB_ENV}"
          git remote set-url origin "git@github.com:${GITHUB_REPOSITORY}.git"
      - name: Run Codex forge-loop prompt with local ChatGPT auth
        id: run_codex
        shell: bash
        run: |
          set -euo pipefail
          # local ChatGPT auth runs the Rust forge-loop engine directly; no outer codex exec sandbox.
          case "${MODEL_INPUT}" in (*[!A-Za-z0-9._:-]*|'') echo "::error::invalid model input"; exit 1 ;; esac
          case "${EFFORT_INPUT}" in (low|medium|high|xhigh) ;; (*) echo "::error::invalid effort input"; exit 1 ;; esac
          case "${PROMPT_FILE_INPUT}" in (.github/codex/prompts/*.md) ;; (*) echo "::error::invalid prompt_file input"; exit 1 ;; esac
          if [ ! -f "${PROMPT_FILE_INPUT}" ]; then
            echo "::error::prompt file not found: ${PROMPT_FILE_INPUT}"
            exit 1
          fi
          if [ ! -x "${CODEX_BIN}" ]; then
            CODEX_BIN="$(command -v codex || true)"
          fi
          if [ -z "${CODEX_BIN:-}" ] || [ ! -x "${CODEX_BIN}" ]; then
            echo "::error::codex binary not found for local ChatGPT auth fallback"
            exit 1
          fi
          if [ ! -s "${CODEX_HOME}/auth.json" ]; then
            echo "::error::CODEX_HOME auth.json missing; local ChatGPT auth fallback cannot run"
            exit 1
          fi
          "${CODEX_BIN}" login status
          export FXRUN_CODEX="${CODEX_BIN}"
          rtk cargo run -q -p runner-cli -- forge-loop run \
            --goal "scheduled subscription-auth Codex self-improvement" \
            2>&1 | tee codex-forge-loop-output.md
      - name: Rehydrate sustain/watch after Codex completion
        if: always()
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          MIN_SUSTAIN_BACKLOG: '4'
          POST_CODEX_REHYDRATE_RETRY_SECONDS: '30'
          POST_CODEX_REHYDRATE_RETRY_ATTEMPTS: '10'
        run: |
          set -euo pipefail
          echo "codex_completion_rehydrate=started" > codex-completion-rehydrate.env
          target_sustain_backlog="${MIN_SUSTAIN_BACKLOG:-4}"
          case "$target_sustain_backlog" in (*[!0-9]*|'') target_sustain_backlog=4 ;; esac
          if [ "$target_sustain_backlog" -lt 1 ]; then target_sustain_backlog=1; fi
          if [ "$target_sustain_backlog" -gt 4 ]; then target_sustain_backlog=4; fi
          pr_pressure_count() {
            local pr_count run_count
            if ! pr_count="$(gh pr list --state open --json statusCheckRollup --jq '
              [
                .[].statusCheckRollup[]?
                | select((.name == "Local Linux CI" or .name == "Semantic PR Title")
                  and ((.status == "QUEUED") or (.status == "IN_PROGRESS") or (.status == "PENDING")
                    or (.conclusion == "FAILURE") or (.conclusion == "TIMED_OUT") or (.conclusion == "CANCELLED")))
              ] | length
            ')"; then
              echo "::notice::Codex completion rehydrate treating PR query failure as pressure" >&2
              echo 1
              return 0
            fi
            if ! run_count="$(gh run list --limit 100 --json name,status --jq '
              [
                .[]
                | select((.name == "CI" or .name == "Semantic PR Title")
                  and ((.status == "queued") or (.status == "pending") or (.status == "in_progress")))
              ] | length
            ')"; then
              echo "::notice::Codex completion rehydrate treating required-run query failure as pressure" >&2
              echo 1
              return 0
            fi
            case "$pr_count" in (*[!0-9]*|'') pr_count=1 ;; esac
            case "$run_count" in (*[!0-9]*|'') run_count=1 ;; esac
            echo $((pr_count + run_count))
          }
          retry_seconds="${POST_CODEX_REHYDRATE_RETRY_SECONDS:-30}"
          retry_attempts="${POST_CODEX_REHYDRATE_RETRY_ATTEMPTS:-10}"
          case "$retry_seconds" in (*[!0-9]*|'') retry_seconds=30 ;; esac
          case "$retry_attempts" in (*[!0-9]*|'') retry_attempts=10 ;; esac
          if [ "$retry_seconds" -lt 5 ]; then retry_seconds=5; fi
          if [ "$retry_seconds" -gt 120 ]; then retry_seconds=120; fi
          if [ "$retry_attempts" -lt 0 ]; then retry_attempts=0; fi
          if [ "$retry_attempts" -gt 20 ]; then retry_attempts=20; fi
          pr_pressure="$(pr_pressure_count)"
          case "$pr_pressure" in (*[!0-9]*|'') pr_pressure=1 ;; esac
          pressure_attempt=0
          while [ "$pr_pressure" -gt 0 ] && [ "$pressure_attempt" -lt "$retry_attempts" ]; do
            pressure_attempt=$((pressure_attempt + 1))
            echo "::notice::Codex completion waiting ${retry_seconds}s for PR-local pressure to clear before sustain rehydrate (${pressure_attempt}/${retry_attempts}, pressure=${pr_pressure})"
            sleep "$retry_seconds"
            pr_pressure="$(pr_pressure_count)"
            case "$pr_pressure" in (*[!0-9]*|'') pr_pressure=1 ;; esac
          done
          echo "rehydrate_pressure_after=${pr_pressure}" >> codex-completion-rehydrate.env
          echo "rehydrate_pressure_attempts=${pressure_attempt}" >> codex-completion-rehydrate.env
          if [ "$pr_pressure" -gt 0 ]; then
            echo "::notice::skipping Codex completion sustain rehydrate because ${pr_pressure} PR-local checks still need the runner lane after ${pressure_attempt} retries"
            echo "sustain=skipped_pr_pressure" >> codex-completion-rehydrate.env
          else
            if ! active_sustain="$(gh run list --workflow runner-sustain.yml --limit 100 --json status --jq '
              [.[] | select((.status == "queued") or (.status == "pending") or (.status == "in_progress"))] | length
            ')"; then
              echo "::notice::skipping Codex completion sustain rehydrate because sustain query failed"
              active_sustain="$target_sustain_backlog"
            fi
            case "$active_sustain" in (*[!0-9]*|'') active_sustain="$target_sustain_backlog" ;; esac
            echo "sustain_active_before=${active_sustain}" >> codex-completion-rehydrate.env
            while [ "$active_sustain" -lt "$target_sustain_backlog" ]; do
              lane_slot="codex-completion-$((active_sustain + 1))"
              echo "::notice::dispatching Runner Sustain from Codex completion lane ${lane_slot} active ${active_sustain}/${target_sustain_backlog}"
              if gh workflow run runner-sustain.yml --ref main -f duration_minutes=5 -f tick_seconds=30 -f lane_slot="${lane_slot}"; then
                active_sustain=$((active_sustain + 1))
              else
                echo "::warning::failed to dispatch Runner Sustain from Codex completion"
                break
              fi
            done
            echo "sustain_active_after_target=${active_sustain}" >> codex-completion-rehydrate.env
          fi
          echo "::notice::dispatching Runner Black Factor Watch codex-completion wakeup"
          gh workflow run runner-black-factor-watch.yml --ref main -f trigger_source=codex_completion \
            || echo "::warning::failed to dispatch Runner Black Factor Watch codex-completion wakeup"
          echo "::notice::dispatching Agentic System Watch codex-completion wakeup"
          gh workflow run agentic-system-watch.yml --ref main -f trigger_source=codex_completion \
            || echo "::warning::failed to dispatch Agentic System Watch codex-completion wakeup"
      - name: Upload Codex output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-forge-loop-output
          path: |
            codex-forge-loop-output.md
            codex-completion-rehydrate.env
            .github/codex/schemas/forge-loop-output.schema.json
