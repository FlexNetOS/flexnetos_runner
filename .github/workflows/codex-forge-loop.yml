name: Codex Forge Loop

on:
  workflow_dispatch:
    inputs:
      prompt_file:
        description: Prompt file to run with Codex
        required: false
        default: .github/codex/prompts/forge-loop.md
      model:
        description: Codex model
        required: false
        default: gpt-5.5
      effort:
        description: Codex reasoning effort
        required: false
        default: high

permissions:
  contents: write
  pull-requests: write
  issues: write


jobs:
  codex-forge-loop:
    name: Codex forge-loop action
    runs-on: [self-hosted, linux, x64, local, flexnetos]
    timeout-minutes: 60
    env:
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CODEX_HOME: /home/drdave/Desktop/meta/.local/share/codex
      CODEX_BIN: /home/drdave/.local/bin/codex
      GH_TOKEN: ${{ github.token }}
      MODEL_INPUT: ${{ inputs.model }}
      EFFORT_INPUT: ${{ inputs.effort }}
      PROMPT_FILE_INPUT: ${{ inputs.prompt_file }}
    outputs:
      final_message: ${{ steps.run_codex.outputs.final-message }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Run Codex forge-loop prompt with OpenAI API key
        id: run_codex
        if: ${{ env.OPENAI_API_KEY != '' }}
        uses: openai/codex-action@v1
        with:
          openai-api-key: ${{ env.OPENAI_API_KEY }}
          prompt-file: ${{ inputs.prompt_file }}
          codex-args: '["--ephemeral","--config","features.auto_compaction=true","--config","model_auto_compact_token_limit=3000000","--config","model_auto_compact_token_limit_scope=\"total\"","--config","tool_output_token_limit=12000","--output-schema",".github/codex/schemas/forge-loop-output.schema.json"]'
          model: ${{ inputs.model }}
          effort: ${{ inputs.effort }}
          sandbox: workspace-write
          safety-strategy: drop-sudo
          allow-bots: dependabot[bot]
          output-file: codex-forge-loop-output.md
      - name: Run Codex forge-loop prompt with local ChatGPT auth
        if: ${{ env.OPENAI_API_KEY == '' }}
        shell: bash
        run: |
          set -euo pipefail
          # local ChatGPT auth fallback runs the Rust forge-loop engine directly; no outer codex exec sandbox.
          case "${MODEL_INPUT}" in (*[!A-Za-z0-9._:-]*|'') echo "::error::invalid model input"; exit 1 ;; esac
          case "${EFFORT_INPUT}" in (low|medium|high|xhigh) ;; (*) echo "::error::invalid effort input"; exit 1 ;; esac
          case "${PROMPT_FILE_INPUT}" in (.github/codex/prompts/*.md) ;; (*) echo "::error::invalid prompt_file input"; exit 1 ;; esac
          if [ ! -f "${PROMPT_FILE_INPUT}" ]; then
            echo "::error::prompt file not found: ${PROMPT_FILE_INPUT}"
            exit 1
          fi
          if [ ! -x "${CODEX_BIN}" ]; then
            CODEX_BIN="$(command -v codex || true)"
          fi
          if [ -z "${CODEX_BIN:-}" ] || [ ! -x "${CODEX_BIN}" ]; then
            echo "::error::codex binary not found for local ChatGPT auth fallback"
            exit 1
          fi
          if [ ! -s "${CODEX_HOME}/auth.json" ]; then
            echo "::error::CODEX_HOME auth.json missing; local ChatGPT auth fallback cannot run"
            exit 1
          fi
          "${CODEX_BIN}" login status
          export FXRUN_CODEX="${CODEX_BIN}"
          cargo run -q -p runner-cli -- forge-loop run \
            --goal "scheduled subscription-auth Codex self-improvement" \
            2>&1 | tee codex-forge-loop-output.md
      - name: Upload Codex output
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: codex-forge-loop-output
          path: |
            codex-forge-loop-output.md
            .github/codex/schemas/forge-loop-output.schema.json
