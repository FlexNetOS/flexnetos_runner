name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  META_CARGO_BIN: /home/drdave/Desktop/meta/.toolchains/cargo/bin

jobs:
  local-linux:
    name: Local Linux CI
    runs-on: [self-hosted, linux, x64, local, flexnetos]
    steps:
      - uses: actions/checkout@v6
      - name: Prefer meta-owned Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          echo "$META_CARGO_BIN" >> "$GITHUB_PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          echo "RUSTC_WRAPPER=" >> "$GITHUB_ENV"
          echo "SCCACHE_WRAPPER=" >> "$GITHUB_ENV"
          "$META_CARGO_BIN/cargo" --version
      - name: Format
        shell: bash
        run: cargo fmt --all -- --check
      - name: Clippy
        shell: bash
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings
      - name: Test
        shell: bash
        run: cargo test --workspace --all-features
      - name: Forge-loop docs drift guard
        shell: bash
        run: cargo run -p runner-cli -- forge-loop docs-drift
      - name: Forge-loop component audit
        shell: bash
        run: cargo run -p runner-cli -- forge-loop components-audit --strict
      - name: Forge-loop target mining audit
        shell: bash
        run: cargo run -p runner-cli -- forge-loop target-mining-audit --strict
      - name: Cargo audit
        shell: bash
        run: |
          set -euo pipefail
          if ! command -v cargo-audit >/dev/null 2>&1; then
            cargo install cargo-audit --locked
          fi
          cargo audit --deny warnings

  compatibility:
    name: Compatibility Test
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Test
        run: cargo test --workspace --all-features
