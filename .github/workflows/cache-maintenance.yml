name: Cache Maintenance

on:
  workflow_dispatch:
    inputs:
      mode:
        description: Cache maintenance mode
        required: true
        default: audit
        type: choice
        options: [audit, compress]
      slot:
        description: Runner slot selector
        required: true
        default: all
        type: choice
        options: [all, "01", "02"]
      min_age:
        description: Minimum age before a cache file can be compressed
        required: true
        default: 7d
        type: string
      dry_run:
        description: Keep compression in dry-run mode
        required: true
        default: true
        type: boolean

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cache-maintenance:
    name: Cache maintenance
    runs-on: [self-hosted, linux, x64, local, flexnetos]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
      - name: Build fxrun
        shell: bash
        run: cargo build -p runner-cli
      - name: Run cache maintenance
        shell: bash
        env:
          FXRUN_BIN: target/debug/fxrun
          FXRUN_CACHE_MAINTENANCE_MODE: ${{ inputs.mode }}
          FXRUN_CACHE_SLOT: ${{ inputs.slot }}
          FXRUN_CACHE_MIN_AGE: ${{ inputs.min_age }}
          FXRUN_CACHE_DRY_RUN: ${{ inputs.dry_run && '1' || '0' }}
          FXRUN_CACHE_FORMAT: json
        run: scripts/cache-maintenance.sh | tee cache-maintenance-report.json
      - name: Upload cache report
        uses: actions/upload-artifact@v4
        with:
          name: cache-maintenance-report
          path: cache-maintenance-report.json
