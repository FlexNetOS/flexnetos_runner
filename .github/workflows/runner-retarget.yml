name: Runner Retarget

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  retarget:
    name: Retarget local runner services to flexnetos repo path
    runs-on: [self-hosted, linux, x64, local, flexnetos]
    timeout-minutes: 5
    steps:
      - name: Checkout retarget script
        uses: actions/checkout@v6

      - name: Install delayed systemd retarget
        shell: bash
        run: |
          set -euo pipefail
          sudo -n install -m 0755 scripts/retarget-local-runner-services.sh /usr/local/sbin/flexnetos-runner-retarget.sh
          sudo -n systemd-run --unit=flexnetos-runner-retarget --on-active=3s /usr/local/sbin/flexnetos-runner-retarget.sh
          echo "retarget scheduled via systemd-run; this job exits before runner services restart"
