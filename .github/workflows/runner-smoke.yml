name: Runner Smoke

on:
  workflow_dispatch:
    inputs:
      expected_runner:
        description: Expected canonical runner name
        required: false
        default: flexnetos-nix
        type: string

permissions:
  contents: read

jobs:
  smoke:
    name: Canonical Nix runner smoke
    runs-on: [self-hosted, flexnetos, nix]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4, repo allowlist

      - name: Verify canonical runner identity and volatile workspace
        shell: nu {0}
        env:
          EXPECTED_RUNNER: ${{ inputs.expected_runner || 'flexnetos-nix' }}
        run: |
          if $env.RUNNER_NAME != $env.EXPECTED_RUNNER {
            error make {msg: $"unexpected runner: ($env.RUNNER_NAME)"}
          }
          let runtime_root = ($env.XDG_RUNTIME_DIR? | default "/run/user/1001")
          if not ($env.RUNNER_WORKSPACE | str starts-with $runtime_root) {
            error make {msg: $"runner workspace escaped volatile runtime: ($env.RUNNER_WORKSPACE)"}
          }
          {
            runner: $env.RUNNER_NAME
            os: $env.RUNNER_OS
            arch: $env.RUNNER_ARCH
            workspace: $env.RUNNER_WORKSPACE
            sha: $env.GITHUB_SHA
          } | to json

      - name: Run 33-gate offline runner contract
        shell: nu {0}
        run: |
          ^bun run nix/gha-runner/verify.mjs
          if $env.LAST_EXIT_CODE != 0 { exit $env.LAST_EXIT_CODE }

      - name: Resolve the canonical Nix closure
        shell: nu {0}
        run: |
          ^nix run "./nix/gha-runner#runner" -- doctor
          if $env.LAST_EXIT_CODE != 0 { exit $env.LAST_EXIT_CODE }

      - name: Test dispatcher and control-plane workspace
        shell: nu {0}
        run: |
          with-env { RUSTC_WRAPPER: "", CARGO_BUILD_RUSTC_WRAPPER: "" } {
            ^cargo test --workspace --locked
          }
          if $env.LAST_EXIT_CODE != 0 { exit $env.LAST_EXIT_CODE }
