name: Agentic System Watch
# OWNER_BREAK_GLASS_ONLY: disabled until every run step is Nushell.
run-name: Agentic System Watch (${{ github.event_name }} ${{ inputs.trigger_source || github.event.workflow_run.name || 'scheduled' }})

on:
  workflow_dispatch:
    inputs:
      trigger_source:
        description: Event source that explicitly requested the agentic watch wakeup
        required: false
        default: manual
  schedule:
    - cron: '*/30 * * * *'
  workflow_run:
    workflows:
      - Runner Black Factor Watch
    types:
      - completed

permissions:
  actions: write
  contents: read
  pull-requests: read

concurrency:
  group: agentic-system-watch-${{ github.ref }}
  cancel-in-progress: false

jobs:
  watch-and-grow:
    if: ${{ vars.FLEXNETOS_OWNER_BREAK_GLASS_NON_NUSHELL == 'I_ACCEPT_NON_NUSHELL' }}
    name: Prove agentic system and dispatch growth
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      RUN_HISTORY_LIMIT: '3000'
    steps:
      - uses: actions/checkout@v6
      - name: Let Codex completion leave active set
        shell: bash
        env:
          TRIGGER_SOURCE: ${{ inputs.trigger_source || '' }}
        run: |
          set -euo pipefail
          if [ "${TRIGGER_SOURCE}" = "codex_completion" ]; then
            echo "::notice::waiting for completed Codex run to leave the active run list"
            sleep 90
          fi
      - uses: dtolnay/rust-toolchain@stable
      - name: Capture run and PR history
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          gh run list --limit "${RUN_HISTORY_LIMIT}" --json name,status,conclusion,createdAt,updatedAt,event,displayTitle,url > runs-live.json
          gh pr list --state open --limit 100 --json number,title,state,mergedAt,statusCheckRollup,url > prs-open.json
          gh pr list --state all --limit 200 --json number,title,state,mergedAt,statusCheckRollup,url > prs-history.json
      - name: Dispatch Codex forge-loop growth when safe
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          open_pr_count="$(jq 'length' prs-open.json)"
          pr_pressure="$(jq '[
            .[].statusCheckRollup[]?
            | select((.name == "Local Linux CI" or .name == "Semantic PR Title")
              and ((.status == "QUEUED") or (.status == "IN_PROGRESS") or (.status == "PENDING")
                or (.conclusion == "FAILURE") or (.conclusion == "TIMED_OUT") or (.conclusion == "CANCELLED")))
          ] | length' prs-open.json)"
          active_codex="$(jq '[
            .[]
            | select((.name == "Codex Forge Loop" or .name == ".github/workflows/codex-forge-loop.yml" or (.name | startswith("Codex Forge Loop (")))
              and ((.status == "queued") or (.status == "pending") or (.status == "in_progress")))
          ] | length' runs-live.json)"
          case "$open_pr_count" in (*[!0-9]*|'') open_pr_count=1 ;; esac
          case "$pr_pressure" in (*[!0-9]*|'') pr_pressure=1 ;; esac
          case "$active_codex" in (*[!0-9]*|'') active_codex=1 ;; esac
          if [ "$open_pr_count" -gt 0 ]; then
            echo "::notice::skipping Codex Forge Loop dispatch because ${open_pr_count} PR(s) are still open"
            echo "dispatch=skipped_open_pr" > agentic-dispatch.env
            exit 0
          fi
          if [ "$pr_pressure" -gt 0 ]; then
            echo "::notice::skipping Codex Forge Loop dispatch because ${pr_pressure} PR-local checks need the pipeline"
            echo "dispatch=skipped_pr_pressure" > agentic-dispatch.env
            exit 0
          fi
          if [ "$active_codex" -gt 0 ]; then
            echo "::notice::skipping Codex Forge Loop dispatch because ${active_codex} run(s) are already active"
            echo "dispatch=skipped_active_codex" > agentic-dispatch.env
            exit 0
          fi
          echo "::notice::dispatching Codex Forge Loop for scheduled self-improvement with local ChatGPT auth on the self-hosted runner"
          gh workflow run codex-forge-loop.yml \
            --ref main \
            -f prompt_file=.github/codex/prompts/forge-loop.md \
            -f model=gpt-5.5 \
            -f effort=high
          echo "dispatch=codex_forge_loop" > agentic-dispatch.env
      - name: Prove end-to-end agentic system
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          if cargo run -q -p runner-cli -- forge-loop agentic-system-audit \
            --runs-json runs-live.json \
            --open-prs-json prs-open.json \
            --prs-history-json prs-history.json \
            --strict \
            --json | tee agentic-system-audit.json; then
            exit 0
          fi
          echo "::notice::agentic proof was not ready on first read; refreshing once after black-factor top-up settles"
          sleep 90
          gh run list --limit "${RUN_HISTORY_LIMIT}" --json name,status,conclusion,createdAt,updatedAt,event,displayTitle,url > runs-live.json
          gh pr list --state open --limit 100 --json number,title,state,mergedAt,statusCheckRollup,url > prs-open.json
          gh pr list --state all --limit 200 --json number,title,state,mergedAt,statusCheckRollup,url > prs-history.json
          if cargo run -q -p runner-cli -- forge-loop agentic-system-audit \
            --runs-json runs-live.json \
            --open-prs-json prs-open.json \
            --prs-history-json prs-history.json \
            --strict \
            --json | tee agentic-system-audit.json; then
            exit 0
          fi
          dispatch_state="$(sed -n 's/^dispatch=//p' agentic-dispatch.env | tail -1)"
          case "${dispatch_state}" in
            codex_forge_loop|skipped_active_codex|skipped_open_pr|skipped_pr_pressure)
              echo "::notice::agentic proof not strict-green yet; dispatch_state=${dispatch_state} keeps growth or PR work in flight"
              exit 0
              ;;
          esac
          exit 1
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: agentic-system-watch-${{ github.run_id }}
          path: |
            runs-live.json
            prs-open.json
            prs-history.json
            agentic-system-audit.json
            agentic-dispatch.env
